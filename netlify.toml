[build]
  command = "npm run build"
  publish = "."
  environment = { NODE_VERSION = "22.18.0" }

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
