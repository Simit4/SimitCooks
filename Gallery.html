  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Lightbox CSS -->
  <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet" />


  
  <style>
    /* Gallery Styles */
    .gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  transition: all 0.4s ease;
}

.gallery-item img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.5s ease;
  display: block;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

/* Hover Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  color: #fff;
  font-weight: 600;
  opacity: 0;
  transition: 0.3s;
}

.gallery-item:hover .overlay {
  opacity: 1;
}

/* Skeleton Loader */
.skeleton {
  background: #f0f0f0;
  animation: pulse 1.2s infinite ease-in-out;
}

@keyframes pulse {
  0% { background-color: #f0f0f0; }
  50% { background-color: #e0e0e0; }
  100% { background-color: #f0f0f0; }
}
  </style>




  
</head>
<body>
  
  <!-- HEADER -->
  <header class="main-header">
    <div class="container header-wrapper">
      <a href="index.html">
        <div class="logo" aria-label="Simit Cooks">
          <span class="logo-modern">Simit's</span>

          <li><a href="equipment.html"><i class="fas fa-blender"></i> Equipment</a></li>
          <li><a href="about.html"><i class="fas fa-address-card"></i> About</a></li>
          <li><a href="gallery.html"><i class="fas fa-image"></i> Gallery</a></li>
        </ul>
        <button class="hamburger">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- GALLERY SECTION -->
<section class="gallery-container">
  <h1 class="gallery-title">🍲 Simit Cooks Gallery</h1>

  <!-- Category Filter Buttons -->
  <div class="category-buttons">
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="appetizer">Appetizers</button>
    <button class="filter-btn" data-category="main">Mains</button>
    <button class="filter-btn" data-category="dessert">Desserts</button>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-grid" id="gallery"></div>
</section>


  
<script>
  
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Initialize Supabase
const supabaseUrl = 'https://ozdwocrbrojtyogolqxn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96ZHdvY3Jicm9qdHlvZ29scXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NzE5MzMsImV4cCI6MjA2NjE0NzkzM30.-MAiUtrdza-T2q8POxY-ZcZuZr5QYzFYq5yd-bVYzRQ';
const supabase = createClient(supabaseUrl, supabaseKey);

  // Fetch images from Supabase
async function loadGallery() {
  const { data, error } = await supabase
    .storage
    .from('gallery')
    .list('', { limit: 100 });

  if (error) {
    console.error('❌ Supabase error:', error);
    return;
  }

  console.log('✅ Fetched files:', data);

  data.forEach(file => {
    const publicUrl = supabase
      .storage
      .from('gallery')
      .getPublicUrl(file.name).data.publicUrl;

    console.log('IMAGE URL:', publicUrl);

    // Now append to your gallery
    const div = document.createElement('div');
    div.className = 'gallery-item';
    div.innerHTML = `
      <img src="${publicUrl}" alt="${file.name}" loading="lazy">
      <div class="overlay">${file.name}</div>
    `;
    document.getElementById('gallery').appendChild(div);
  });
}

loadGallery();
</script>
