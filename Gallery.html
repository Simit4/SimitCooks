<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />  

  <title>Gallery | Simit Cooks</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Open+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Lightbox CSS -->
  <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet" />


  
  <style>
    /* Gallery Styles */
    .gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  transition: all 0.4s ease;
}

.gallery-item img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.5s ease;
  display: block;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

/* Hover Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  color: #fff;
  font-weight: 600;
  opacity: 0;
  transition: 0.3s;
}

.gallery-item:hover .overlay {
  opacity: 1;
}

/* Skeleton Loader */
.skeleton {
  background: #f0f0f0;
  animation: pulse 1.2s infinite ease-in-out;
}

@keyframes pulse {
  0% { background-color: #f0f0f0; }
  50% { background-color: #e0e0e0; }
  100% { background-color: #f0f0f0; }
}
  </style>




  
</head>
<body>
  
  <!-- HEADER -->
  <header class="main-header">
    <div class="container header-wrapper">
      <a href="index.html">
        <div class="logo" aria-label="Simit Cooks">
          <span class="logo-modern">Simit's</span>
          <span class="logo-traditional">Cooks</span>
        </div>
      </a>
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="recipes.html"><i class="fas fa-book"></i> Recipes</a></li>
          <li><a href="equipment.html"><i class="fas fa-blender"></i> Equipment</a></li>
          <li><a href="about.html"><i class="fas fa-address-card"></i> About</a></li>
          <li><a href="gallery.html"><i class="fas fa-image"></i> Gallery</a></li>
        </ul>
        <button class="hamburger">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- GALLERY SECTION -->
<section class="gallery-container">
  <h1 class="gallery-title">🍲 Simit Cooks Gallery</h1>

  <!-- Category Filter Buttons -->
  <div class="category-buttons">
    <button class="filter-btn active" data-category="all">All</button>
    <button class="filter-btn" data-category="appetizer">Appetizers</button>
    <button class="filter-btn" data-category="main">Mains</button>
    <button class="filter-btn" data-category="dessert">Desserts</button>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-grid" id="gallery"></div>
</section>


  
<script>
  
// gallery.js
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// Supabase credentials
const supabaseUrl = 'https://ozdwocrbrojtyogolqxn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96ZHdvY3Jicm9qdHlvZ29scXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NzE5MzMsImV4cCI6MjA2NjE0NzkzM30.-MAiUtrdza-T2q8POxY-ZcZuZr5QYzFYq5yd-bVYzRQ'; // Replace with your actual anon key
const supabase = createClient(supabaseUrl, supabaseKey);

// DOM elements
const container = document.getElementById('gallery');
const filterButtons = document.querySelectorAll('.filter-btn');

let allImages = [];
let filteredImages = [];
let loadedCount = 0;
const BATCH = 12;

// -------------------------------
// Skeleton loader
// -------------------------------
function showSkeleton(count = BATCH) {
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const skeleton = document.createElement('div');
    skeleton.className = 'gallery-item skeleton';
    skeleton.innerHTML = `<div class="image-wrapper"></div>`;
    container.appendChild(skeleton);
  }
}

// -------------------------------
// Render batch of images
// -------------------------------
function renderBatch(data) {
  const fragment = document.createDocumentFragment();
  const batch = data.slice(loadedCount, loadedCount + BATCH);

  batch.forEach(item => {
    const div = document.createElement('div');
    div.className = 'gallery-item fade-in';
    div.innerHTML = `
      <img src="${item.url}" alt="${item.name}" loading="lazy">
      <div class="overlay">${item.emoji} ${item.name}</div>
    `;
    // Optional: click → go to recipe page
    div.addEventListener('click', () => {
      if (item.recipeLink) window.location.href = item.recipeLink;
    });
    fragment.appendChild(div);
  });

  container.appendChild(fragment);
  loadedCount += batch.length;

  // Wait for images to load to avoid layout shift
  const images = container.querySelectorAll('img');
  let loadedImages = 0;
  images.forEach(img => {
    if (img.complete) loadedImages++;
    else img.onload = () => { loadedImages++; };
  });

  observeLastItem();
}

// -------------------------------
// Infinite scroll observer
// -------------------------------
function observeLastItem() {
  const items = container.querySelectorAll('.gallery-item');
  const lastItem = items[items.length - 1];
  if (!lastItem) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting && loadedCount < filteredImages.length) {
        renderBatch(filteredImages);
        observer.disconnect();
      }
    });
  }, { rootMargin: '200px' });

  observer.observe(lastItem);
}

// -------------------------------
// Fetch images from Supabase Storage
// -------------------------------
async function fetchGallery() {
  try {
    showSkeleton();

    const { data, error } = await supabase
      .storage
      .from('gallery')
      .list('', { limit: 100, sortBy: { column: 'name', order: 'asc' } });

    if (error) throw error;

    allImages = data.map(file => {
      const nameLower = file.name.toLowerCase();
      let category = 'main', emoji = '🍲';

      if (nameLower.startsWith('appetizer')) { category = 'appetizer'; emoji = '🥗'; }
      if (nameLower.startsWith('dessert')) { category = 'dessert'; emoji = '🍰'; }

      const name = file.name.replace(/\.(jpg|jpeg|png|webp|gif)$/i, '')
                            .replace(/_/g, ' ')
                            .replace(/\b(appetizer|main|dessert)\b/i, '')
                            .trim();

      const url = supabase.storage.from('gallery').getPublicUrl(file.name).data.publicUrl;

      return { url, name, category, emoji, recipeLink: null }; // add recipeLink if needed
    });

    filteredImages = allImages;
    loadedCount = 0;
    container.innerHTML = '';
    renderBatch(filteredImages);

  } catch (err) {
    console.error('❌ Gallery fetch error:', err);
    container.innerHTML = "<p class='error-message'>Failed to load gallery.</p>";
  }
}

// -------------------------------
// Filter buttons
// -------------------------------
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.filter-btn.active')?.classList.remove('active');
    btn.classList.add('active');

    const filter = btn.dataset.category;
    filteredImages = filter === 'all'
      ? allImages
      : allImages.filter(img => img.category === filter);

    container.innerHTML = '';
    loadedCount = 0;
    renderBatch(filteredImages);
  });
});

// -------------------------------
// Fade-in animation CSS
// -------------------------------
const style = document.createElement('style');
style.innerHTML = `
  .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s forwards; }
  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
  .skeleton { background: #eee; min-height: 200px; border-radius: 15px; }
`;
document.head.appendChild(style);

// -------------------------------
// Initialize
// -------------------------------
fetchGallery();

  
</script>



  

  <!-- Your existing mobile menu script -->
  <script type="module" src="mobile-menu.js"></script>
  <script type="module" src="footer.js"></script>

  
</body>
</html>
