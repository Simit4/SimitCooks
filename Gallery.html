<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />  

  <title>Gallery | Simit Cooks</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Open+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Lightbox CSS -->
  <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet" />

  <style>
    /* Gallery Styles */
    .gallery-container {
      max-width: 1400px;
      margin: 50px auto;
      padding: 0 20px;
    }
    .gallery-title {
      text-align: center;
      color: #ff6b6b;
      margin-bottom: 30px;
    }

    /* Category Buttons */
    .category-buttons {
      text-align: center;
      margin-bottom: 40px;
    }
    .category-buttons button {
      background: #fff;
      border: 2px solid #ff6b6b;
      color: #ff6b6b;
      padding: 8px 20px;
      margin: 0 10px 10px 0;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .category-buttons button.active,
    .category-buttons button:hover {
      background: #ff6b6b;
      color: #fff;
    }

    /* Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .gallery-item {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .gallery-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .gallery-item:hover img {
      transform: scale(1.05);
    }

    /* Hover Overlay */
    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 15px;
      font-weight: 600;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .gallery-item:hover .overlay {
      opacity: 1;
    }
  </style>
</head>
<body>
  
  <!-- HEADER -->
  <header class="main-header">
    <div class="container header-wrapper">
      <a href="index.html">
        <div class="logo" aria-label="Simit Cooks">
          <span class="logo-modern">Simit's</span>
          <span class="logo-traditional">Cooks</span>
        </div>
      </a>
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="recipes.html"><i class="fas fa-book"></i> Recipes</a></li>
          <li><a href="equipment.html"><i class="fas fa-blender"></i> Equipment</a></li>
          <li><a href="about.html"><i class="fas fa-address-card"></i> About</a></li>
          <li><a href="gallery.html"><i class="fas fa-image"></i> Gallery</a></li>
        </ul>
        <button class="hamburger">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- GALLERY SECTION -->
  <section class="gallery-container">
    <h1 class="gallery-title">🍲 Simit Cooks Gallery</h1>

    <!-- Category Filter Buttons -->
    <div class="category-buttons">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="appetizer">Appetizers</button>
      <button class="filter-btn" data-category="main">Mains</button>
      <button class="filter-btn" data-category="dessert">Desserts</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="gallery"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Simit Cooks. All rights reserved.</p>
    </div>
  </footer>

  
<script>
document.addEventListener("DOMContentLoaded", async () => {

const supabaseUrl = 'https://ozdwocrbrojtyogolqxn.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96ZHdvY3Jicm9qdHlvZ29scXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA1NzE5MzMsImV4cCI6MjA2NjE0NzkzM30.-MAiUtrdza-T2q8POxY-ZcZuZr5QYzFYq5yd-bVYzRQ'; // Replace with your actual anon key

  const { createClient } = supabase;
  const client = createClient(supabaseUrl, supabaseKey);

  const gallery = document.getElementById('gallery');

  if (!gallery) {
    console.error("❌ Gallery div not found");
    return;
  }

  const { data, error } = await client.storage.from('gallery').list();

  if (error) {
    console.error('❌ Supabase error:', error);
    return;
  }

  console.log('✅ Files:', data);

  data.forEach(file => {
    const url = client.storage
      .from('gallery')
      .getPublicUrl(file.name).data.publicUrl;

    console.log('Image URL:', url);

    const div = document.createElement('div');
    div.className = 'gallery-item';

    div.innerHTML = `
      <img src="${url}" alt="${file.name}">
      <div class="overlay">${file.name}</div>
    `;

    gallery.appendChild(div);
  });

});
</script>

  <!-- Your existing mobile menu script -->
  <script type="module" src="mobile-menu.js"></script>
  
</body>
</html>
