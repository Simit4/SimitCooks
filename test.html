<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Gallery</title>
  <link rel="stylesheet" href="test.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <h1 style="text-align:center; margin-bottom:30px;">Simi's Recipes</h1>

  <!-- Search Bar -->
  <div style="text-align:center;">
    <input type="text" id="search-input" placeholder="Search recipes...">
  </div>

  <!-- Filter Buttons -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="video">Videos</button>
    <button class="filter-btn" data-filter="main">Main</button>
    <button class="filter-btn" data-filter="snack">Snack</button>
    <button class="filter-btn" data-filter="dessert">Dessert</button>
    <button class="filter-btn" data-filter="festival">Festival</button>
  </div>

  <!-- Recipe Grid -->
  <div id="recipes-container"></div>

  <!-- JS -->
  <script type="module" src="test.js"></script>
</body>
</html>
