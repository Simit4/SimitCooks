<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simi’s Swaad | Recipes</title>
  <link rel="stylesheet" href="test.css" />
</head>
<body>
  <!-- 🔥 Navbar -->
  <header class="site-header">
    <div class="logo">Simi’s <span>Swaad</span></div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Recipes</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- 🔥 Hero -->
  <section class="hero">
    <h1>Delicious Recipes for Every Occasion</h1>
    <p>Authentic Nepali & world flavors, simple to make at home.</p>
  </section>

  <!-- 🔥 Filters & Search -->
  <section class="controls">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="video">Video Only</button>
      <button class="filter-btn" data-filter="main">Main</button>
      <button class="filter-btn" data-filter="snack">Snack</button>
      <button class="filter-btn" data-filter="dessert">Dessert</button>
      <button class="filter-btn" data-filter="festival">Festival</button>
    </div>
    <input type="text" id="search-input" placeholder="Search recipes..." />
  </section>

  <!-- 🔥 Recipe Cards -->
  <main>
    <div id="recipes-container" class="recipes-grid"></div>
  </main>

  <!-- 🔥 Footer -->
  <footer class="site-footer">
    <p>© 2025 Simi’s Swaad · Made with ❤️ in Melbourne</p>
  </footer>

  <script type="module" src="test.js"></script>
</body>
</html>
