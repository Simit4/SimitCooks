<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Delicious Recipes</h1>
  </header>

  <section class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="video">Video</button>
    <button class="filter-btn" data-filter="text">Text Only</button>
    <button class="filter-btn" data-filter="main">Main</button>
    <button class="filter-btn" data-filter="snack">Snack</button>
    <button class="filter-btn" data-filter="dessert">Dessert</button>
    <button class="filter-btn" data-filter="festival">Festival</button>
  </section>

  <section id="recipeGrid" class="recipe-grid">
    <!-- Recipes dynamically inserted here -->
  </section>

  <script type="module" src="test.js"></script>
</body>
</html>
