<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Recipes | Simi’s Swaad</title>
  <link rel="stylesheet" href="/test.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo">🍲 Simi’s Swaad</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="all-recipes.html" class="active">All Recipes</a></li>
        <li><a href="videos.html">Videos</a></li>
        <li><a href="equipment.html">Equipment</a></li>
        <li><a href="about.html">About</a></li>
      </ul>

  <!-- Hero -->
  <section class="hero">
    <h1>All Recipes</h1>
    <p>Discover authentic Nepali recipes and more — simple, home-style cooking with love.</p>
  </section>

  <!-- Filter Bar -->
  <section class="filter-bar">
    <input type="text" id="searchBox" placeholder="🔍 Search recipes..." />

    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>

      <button class="filter-btn" data-filter="curry">Curries</button>

    </div>
  </section>

  <!-- Recipes Grid -->
  <main class="recipes-grid" id="recipesGrid">
    <!-- Recipes will be injected here dynamically via recipes.js -->

  <!-- Footer -->
  <footer class="site-footer">
