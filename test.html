<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes</title>
  <link rel="stylesheet" href="test.css">
</head>
<body>
  <header class="main-header">
    <div class="container header-wrapper">
      <h1 class="logo">Simi's Swaad</h1>
      <nav>
        <input type="text" id="search-input" placeholder="Search recipes...">
      </nav>
    </div>
  </header>

  <section class="filters container">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="main">Main</button>
    <button class="filter-btn" data-filter="snack">Snack</button>
    <button class="filter-btn" data-filter="dessert">Dessert</button>
    <button class="filter-btn" data-filter="video">Video Only</button>
  </section>

  <section class="recipes-grid container" id="recipes-container">
    <!-- Recipes will load here dynamically -->
  </section>
</body>
    <script type="module" src="test.js" defer></script>
</html>
