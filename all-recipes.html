<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Recipes | Simit's Swaad</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="test.css">
<meta name="description" content="Explore all Nepali and home-style recipes from Simit's Swaad. Discover recipes with videos and recipe cards for easy cooking.">
</head>
<body>

<header>
<section class="recipes-header">
  <h2 class="section-title">All Recipes</h2>
  
  <!-- Search bar -->
  <input type="text" id="search-input" placeholder="Search recipes 🔍" />

  <!-- Dropdown filters -->
  <div class="filters">
    <select id="category-filter">
      <option value="">All Categories</option>
      <option value="snack">Snack</option>
      <option value="wraps">Wraps</option>
      <option value="breakfast">Breakfast</option>
      <!-- Add more categories from your Supabase -->
    </select>

    <select id="cuisine-filter">
      <option value="">All Cuisines</option>
      <option value="Nepali">Nepali</option>
      <option value="Fusion">Fusion</option>
      <!-- Add more cuisines -->
    </select>

    <select id="festival-filter">
      <option value="">All Festivals</option>
      <option value="Dashain">Dashain</option>
      <option value="Tihar">Tihar</option>
      <!-- Add more festivals if needed -->
    </select>
  </div>
</section>

</header>

<main class="container">
  <section class="recipes-header">
    <h2 class="section-title">All Recipes</h2>
    <input type="text" id="search-input" placeholder="Search recipes 🔍">
    <select id="category-filter">
      <option value="">All Categories</option>
      <!-- Categories will be dynamically added -->
    </select>
  </section>

  <section id="recipes-container" class="recipes-grid">
    <!-- Recipe cards injected here -->
  </section>
</main>

<script type="module" src="test.js"></script>
<script type="module" src="footer.js"></script>
<script type="module" src="mobile-menu.js"></script>

</body>
</html>
