<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Dynamic title will be set by JavaScript -->
  <title>Loading Recipe... | Simit's Swaad</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Open+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Dynamic SEO Meta Tags -->
  <meta id="meta-description" name="description" content="Delicious recipe loading..." />
  <meta id="meta-keywords" name="keywords" content="recipe, cooking" />
  <meta name="author" content="Simit's Swaad" />

  <!-- Dynamic Open Graph -->
  <meta id="og-title" property="og:title" content="Loading Recipe | Simit's Swaad" />
  <meta id="og-description" property="og:description" content="Delicious recipe loading..." />
  <meta id="og-image" property="og:image" content="" />
  <meta id="og-url" property="og:url" content="" />
</head>

<body>
  <header class="main-header">
    <div class="container header-wrapper">
      <div class="logo" aria-label="Simit's Swaad">
        <span class="logo-modern">Simit’s</span>
        <span class="logo-traditional">Swaad</span>
      </div> 
      
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
          <li><a href="/recipes"><i class="fas fa-book"></i> Recipes</a></li>
          <li><a href="/equipment"><i class="fas fa-blender"></i> Equipment</a></li>
          <li><a href="/about"><i class="fas fa-address-card"></i> About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Recipe Content Section -->
  <main class="recipe-page container">
    <article id="recipe-content">
      <!-- All content will be dynamically loaded here -->
      <h1 id="recipe-title">Loading recipe...</h1>
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
    </article>
  </main>

  <!-- Equipment Section -->
  <section class="equipment-section container" id="equipment-section" style="display:none;">
    <h2 class="section-title">Recommended Kitchen Equipment</h2>
    <div id="equipment-container" class="equipment-grid"></div>
  </section>

  <footer class="main-footer">
    <!-- Your existing footer -->
  </footer>

  <!-- Important: Use this script tag -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="recipe.js"></script>
</body>
</html>
