<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google-site-verification" content="LnPzqNhuaGlF2M9762b2ESN7eWzJtw-CnatXSGeN_yM" />  
  
  <title>Recipe | Simit Cooks</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700&family=Unbounded:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="/recipe.css" />
    <link rel="stylesheet" href="/style.css" />


  <!-- SEO Meta Tags -->
  <meta name="description" content="Easy and delicious home-style recipes like chowmein, curry, and more. Try them now!" />
  <meta name="keywords" content="Nepali recipes, easy recipes, home cooking, vegetarian curry, chowmein, roti sabzi" />
  <meta name="author" content="Simit Cooks" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="Recipe | Simit Cooks" />
  <meta property="og:description" content="Try delicious home-style recipes made with love. Simple, tasty, and perfect for every day!" />
  <meta property="og:image" content="https://yourwebsite.com/your-thumbnail.jpg" />
  <meta property="og:url" content="https://yourwebsite.com/recipe.html" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SL2G2MYTZX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SL2G2MYTZX');
  </script>
</head>

<body>


<!-- Recipe Content -->
<section class="recipe-page">
  <h1 id="recipe-title"></h1>

  <!-- Meta Info Card -->
  <div class="recipe-meta-card">
    <span><i class="fas fa-clock"></i> Prep: <span id="prep-time"></span></span>
    <span><i class="fas fa-utensils"></i> Cook: <span id="cook-time"></span></span>
    <span><i class="fas fa-users"></i> Serves: <span id="servings"></span></span>
  </div>

  <!-- Description -->
  <p class="description" id="recipe-description"></p>

  <!-- Ingredients & Method -->
  <div class="recipe-section">
    <div class="ingredients">
      <h3><i class="fas fa-list-ul"></i> Ingredients</h3>
      <ul id="ingredients-list"></ul>
    </div>

    <div class="method">
      <h3><i class="fas fa-step-forward"></i> Method</h3>
      <ol id="method-list"></ol>
    </div>
  </div>

  <!-- Recipe Video -->
  <div class="recipe-video" id="recipe-video-container"></div>

  <!-- Nutrition Info -->
  <div id="nutrition"></div>

  <!-- Notes & Fun Facts -->
  <div class="extra-info">
    <h3><i class="fas fa-pencil-alt"></i> Notes</h3>
    <p id="notes"></p>

    <h3><i class="fas fa-lightbulb"></i> Fun Fact</h3>
    <p id="facts"></p>
  </div>

  <!-- Tags / Cuisine / Category -->
  <div class="recipe-tags">
    <p><strong><i class="fas fa-tags"></i> Tags:</strong> <span id="tags"></span></p>
    <p><strong><i class="fas fa-globe"></i> Cuisine:</strong> <span id="cuisine"></span></p>
    <p><strong><i class="fas fa-folder"></i> Category:</strong> <span id="category"></span></p>
  </div>

  <!-- Action Buttons -->
  <div class="recipe-actions">
    <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print Recipe</button>
    <button class="btn-share" onclick="shareRecipe()"><i class="fas fa-share-alt"></i> Share</button>
    <button class="btn-save" onclick="saveRecipe()"><i class="fas fa-heart"></i> Save</button>
  </div>
</section>

<!-- More Recipes Section -->
<section class="more-recipes">
  <h2 class="section-title">More Recipes You’ll Love</h2>
  <div class="more-recipes-grid" id="more-recipes-container">
    <!-- Recipes injected via JS -->
  </div>
</section>

  
<!-- Scripts -->
<script type="module" src="/style.js"></script>
<script type="module" src="/recipe.js"></script>

</body>
</html>
